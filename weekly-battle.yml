name: LLM Weekly Battle

on:
  schedule:
    - cron: '0 9 * * 1'   # Todos los lunes a las 9:00 UTC
  workflow_dispatch:        # También permite dispararlo a mano desde GitHub

jobs:
  battle:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necesario para hacer push del resultado

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run battle
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GROK_KEY: ${{ secrets.GROK_KEY }}
          KIMI_KEY: ${{ secrets.KIMI_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          AZURE_KEY: ${{ secrets.AZURE_KEY }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node battle.js

      - name: Commit and push results
        run: |
          git config user.name "LLM Battle Bot"
          git config user.email "bot@llmbattle"
          git add docs/
          git diff --staged --quiet || git commit -m "Battle semana $(date +'%Y-W%V')"
          git push
